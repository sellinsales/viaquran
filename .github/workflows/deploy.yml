name: Deploy ViaQuran

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build

      - name: Prepare deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy/.next
          cp -R .next/standalone deploy/.next/
          cp -R .next/static deploy/.next/
          cp -R public deploy/
          mkdir -p deploy/.next/standalone/viaquran/.next
          mkdir -p deploy/.next/standalone/viaquran/public
          cp -R .next/static deploy/.next/standalone/viaquran/.next/
          cp -R public/. deploy/.next/standalone/viaquran/public/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp server.js deploy/
          cp next.config.mjs deploy/
          cp .env.example deploy/
          mkdir -p deploy/data
          cp data/schema.sql deploy/data/

      - name: Upload over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          local-dir: ./deploy/
          server-dir: ${{ vars.FTP_REMOTE_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.env
